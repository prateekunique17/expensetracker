<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="text-align: left;">
                <h1 class="header-title">Overview</h1>
                <p class="header-subtitle">Your personal financial dashboard</p>
            </div>
            <div style="display: flex; gap: 0.75rem;">
                <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">Light Mode</button>
                <button onclick="window.location.href='login.html'" class="theme-toggle">Log Out</button>
            </div>
        </header>

        <section class="summary-section">
            <div class="summary-card">
                <div class="card-content">
                    <span class="card-label">Total Balance</span>
                    <h2 class="card-value" id="totalBalance">₹0.00</h2>
                </div>
            </div>
            <div class="summary-card">
                <div class="card-content">
                    <span class="card-label">Income</span>
                    <h2 class="card-value" id="totalIncome" style="color: var(--income);">₹0.00</h2>
                </div>
            </div>
            <div class="summary-card">
                <div class="card-content">
                    <span class="card-label">Expenses</span>
                    <h2 class="card-value" id="totalExpenses" style="color: var(--expense);">₹0.00</h2>
                </div>
            </div>
            <div class="summary-card">
                <div class="card-content">
                    <span class="card-label">Savings</span>
                    <h2 class="card-value" id="totalSavings">₹0.00</h2>
                </div>
            </div>
        </section>

        <div class="main-grid">
            <div class="left-column">
                <section class="form-section">
                    <h3 class="section-title">Add Transaction</h3>
                    <form id="transactionForm" class="transaction-form">
                        <div class="form-group">
                            <label for="title">Description</label>
                            <input type="text" id="title" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="amount">Amount (₹)</label>
                                <input type="number" id="amount" step="0.01" min="0" required>
                            </div>
                            <div class="form-group">
                                <label for="type">Type</label>
                                <select id="type" required>
                                    <option value="income">Income</option>
                                    <option value="expense">Expense</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" required>
                                    <option value="salary">Salary</option>
                                    <option value="freelance">Freelance</option>
                                    <option value="investment">Investment</option>
                                    <option value="food">Food</option>
                                    <option value="transport">Transport</option>
                                    <option value="shopping">Shopping</option>
                                    <option value="bills">Bills</option>
                                    <option value="entertainment">Entertainment</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="date">Date</label>
                                <input type="date" id="date" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="note">Notes (Optional)</label>
                            <textarea id="note" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Add</button>
                    </form>
                </section>

                <section class="transactions-section">
                    <div class="transactions-header">
                        <h3 class="section-title" style="margin-bottom:0; border:none; padding:0;">History</h3>
                        <div class="filter-controls">
                            <input type="text" id="searchInput" placeholder="Search...">
                            <select id="filterSelect">
                                <option value="all">All</option>
                                <option value="income">Income</option>
                                <option value="expense">Expense</option>
                            </select>
                        </div>
                    </div>
                    <div id="transactionsList" class="transactions-list">
                        <p class="empty-state">No transactions yet.</p>
                    </div>
                </section>
            </div>

            <div class="right-column">
                <section class="charts-section">
                    <h3 class="section-title">Analytics</h3>
                    <div class="chart-container">
                        <h4 class="chart-title">Expenses Breakdown</h4>
                        <canvas id="categoryChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h4 class="chart-title">Income vs Expenses</h4>
                        <canvas id="comparisonChart"></canvas>
                    </div>
                    <button id="clearAllBtn" class="btn-clear-all-analytics">Clear All Data</button>
                </section>
            </div>
        </div>
    </div>


    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Transaction</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="editForm" class="transaction-form">
                <input type="hidden" id="editTransactionId">
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="editAmount" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="editType" required>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="editCategory" required>
                            <option value="salary">Salary</option>
                            <option value="freelance">Freelance</option>
                            <option value="investment">Investment</option>
                            <option value="food">Food</option>
                            <option value="transport">Transport</option>
                            <option value="shopping">Shopping</option>
                            <option value="bills">Bills</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="editDate" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="editNote" rows="2"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
