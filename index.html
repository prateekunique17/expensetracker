<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Premium Financial Management</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .landing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        .hero-title {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #ff8c42 50%, #ff6b35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            letter-spacing: -0.04em;
            line-height: 1.1;
            text-shadow: 0 0 60px rgba(255, 107, 53, 0.4);
            animation: fadeInDown 1s ease;
        }
        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 3rem;
            line-height: 1.6;
            animation: fadeInUp 1s ease;
            animation-delay: 0.2s;
            animation-fill-mode: both;
        }
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 3rem;
            font-size: 1.1rem;
            background: var(--orange-gradient);
            color: var(--text-primary);
            border-radius: var(--radius-full);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 8px 32px var(--orange-glow);
            transition: all var(--transition-smooth);
            animation: fadeInUp 1s ease;
            animation-delay: 0.4s;
            animation-fill-mode: both;
        }
        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px var(--orange-glow);
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <h1 class="hero-title">Track your money smartly</h1>
        <p class="hero-subtitle">Take control of your finances with our premium dark-themed expense tracker. Powerful insights, beautifully designed.</p>
        <a href="login.html" class="cta-button">
            Get Started
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>
    </div>
</body>
</html>
